<!DOCTYPE html>
<html>
<head>
<title>Registration Page</title>
</head>
<body style="text-align:center; background-color: white;">
    <h2>Registration Form</h2>
    <form>
        <label>Name:*</label><br>
        <input type="text" placeholder="Enter your full name"><br><br>
        <label>Email:*</label><br>
        <input type="email" placeholder="Enter your email"><br><br>
        <label>Password:*</label><br>
        <input type="password" placeholder="Enter your password"><br><br>
        <label>Gender:*</label><br><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female<br><br>
        <label>Hobbies:*</label><br><br>
        <input type="checkbox"> sports
        <input type="checkbox"> reading
        <input type="checkbox"> driving
        <input type="checkbox"> Travelling
        <input type="checkbox"> gaming
        <input type="checkbox"> singing
        <input type="checkbox"> cooking
        <input type="checkbox"> dancing<br><br>
        <input type="submit" value="Save">
    </form>
