
<html>
<head>
  <title>Example 1 - Margin and Padding</title>
  <style>
    body {
      background-color: yellow;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 60px;
    }

    h2 {
      color: darkred;
    }
    


    .outer {
      background-color: blue;
      width: 400px;
      margin: 30px auto;
      padding: 30px;
      border: 3px solid brown;
    }


    .inner {
      background-color: white;
      color: black;
      font-size: 18px;
      font-weight: bold;
      padding: 20px;      
      margin: 10px;       
      border: 2px solid black;
    }

  </style>
</head>
<body>

  <h2>Example 1 -Margin and Padding</h2>
  <div class="outer">
    <h3>outer box</h3>

    <div class="inner">
      <h3>Inner box</h3>
    </div>
  </div>




</body>
</html>
