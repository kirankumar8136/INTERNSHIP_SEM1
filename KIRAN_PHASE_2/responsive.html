<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESPONSIVE DESIGN</title>
</head>
<style>
    .body{
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }
    .navbar{
        width: 100%;
        height: 40px;
        background-color: steelblue;
        color: whitesmoke;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .logo{
        font-size: 25px;
        font-weight: bold;
        font-family:Arial, Helvetica, sans-serif;
        padding: 30px;
    }
    .links a{
        color: black;
        text-decoration: none;
        margin-right: 20px;
        font-size: 18px;
    }
    .bodysession{
        margin-top: 20px;         
        color: black;
        text-align: center;
        padding: 30px 20px;
        border-radius: 10px;
    }
    .cards {
      display: flex;
      gap: 16px;
      padding: 20px;
      justify-content: center;
    }
    .card {
      background-color: navajowhite;
      border: 2px solid steelblue;
      padding: 20px;
      width: 250px;
      text-align: center;
      border-radius: 6px;
    }
    .card h3 { color: darkblue; margin-bottom: 8px; }
    .card p  { font-size: 14px; color: gray; }
    footer {
      background-color: steelblue;
      color: white;
      text-align: center;
      margin-top: 100px;
      padding: 16px;
      font-size: 14px;
    }
     @media (min-width: 1024px) {
      .screen-label {
        background-color: cyan;
        color: purple;
      }
      .screen-label::before {
       content:  "🖥️ DESKTOP VIEW (above 1024px)";
      }
    }
    @media (min-width: 601px) and (max-width: 1023px) {
      .screen-label {
        background-color: #fff3cd;
        color: darkorange;
      }
      .screen-label::before {
        content: "📱 TABLET VIEW (601px to 1023px)";
      }
    }
    @media (max-width: 600px) {
      .screen-label {
        background-color: burlywood;
        color: black;
      }
      .screen-label::before {
        content: "📲 MOBILE VIEW (600px and below)";
      }
    }
</style>
<body>
    <div class="screen-label"></div>
    <div class="navbar">
        <div class="logo"></div>
        <div class="links">
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Contact</a>
        </div>
    </div>
    <div class="bodysession">
        <h1>My Website</h1>
        <p>This is a responsive design page, It is made to check weather the layout fit on all screen sizes.</p>
    </div>
      <div class="cards">
        <div class="card">
            <h3>GAMES</h3>
            <p>New Released PC Games</p>
        </div>
        <div class="card">
            <h3>CONSOLES</h3>
            <p>Best gaming consoles for 2026</p>
        </div>
        <div class="card">
            <h3>GADGETS</h3>
            <p>Latest tech gadgets and accessories</p>
        </div>
    </div>
  <footer>
    <b>Created With Responsive Design<b>
  </footer>
</body>
</html>
