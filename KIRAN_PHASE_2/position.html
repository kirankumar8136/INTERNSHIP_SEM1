<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>POSITION SAMPLE</title>
  <style>
    body {
      background-color: lightcyan;
      font-family: Arial, sans-serif;
      padding: 20px;
      padding-top: 70px; 
    }
    h2 { color: darkblue; text-align: center; }
    h3 { color: black; margin-top: 30px; }
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: gray;
      color: black;
      padding: 12px 20px;
      font-weight: bold;
      font-size: 16px;
      z-index: 100;
    }
    .static-box {
      position: static;   
      background-color: green;
      color: white;
      padding: 10px;
      margin-bottom: 5px;
      font-weight: bold;
      width: 250px;
    }
    .relative-parent {
      background-color: DARKred;
      border: 2px black;
      padding: 10px;
      width: 300px;
      height: 80px;
    }
    .relative-box {
      position: relative;
      top: 15px;           
      left: 30px;          
      background-color: blue;
      color: white;
      padding: 10px;
      font-weight: bold;
      width: 200px;
    }
    .absolute-parent {
      position: relative;  
      background-color: lightgray;
      border: 2px black;
      width: 300px;
      height: 120px;
      margin-top: 10px;
    }
    .absolute-box {
      position: absolute;
      top: 10px;          
      right: 10px;         
      background-color: white;
      color: black;
      padding: 8px 12px;
      font-weight: bold;
      font-size: 13px;
    }
    .image-box {
      position: relative;
      display: inline-block;
      margin-top: 10px;
    }
    .badge {
      position: absolute;
      top: -10px;
      right: -10px;
      background-color: black;
      color: white;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      line-height: 30px;
      text-align: center;
      font-weight: bold;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="navbar">POSITION SAMPLE</div>
  <h2>POSITION SAMPLES</h2>
  <h3>POSITION: STATIC</h3>
  <div class="static-box">Static Box 1</div>
  <div class="static-box">Static Box 2</div>
    <h3>POSITION: RELATIVE</h3>
  <div class="relative-parent">
    <div class="relative-box">Relative Box </div>
  </div>
    <h3>POSITION: ABSOLUTE</h3>
  <div class="absolute-parent">
    Parent Box
    <div class="absolute-box">Absolute Box</div>
  </div>
  <h3>BADGE ON IMAGE</h3>
  <div class="image-box">
    <div class="img"><img src="icon-512.png"></div>
    <div class="badge">NEW</div>
  </div>
  <br><br><br>
</body>
</html>
