<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Block sample</title>
    <style>
        body {
            background-color: white;
            font-family: Arial, sans-serif;
            padding-top: 60px;
        }

        h2 {
            color: green;
        }

        .Block{
            display: block;
            background-color: black;
            color: white;
            padding: 10px;
            margin: 10px;
        }
        .inline{
            display: inline;
            background-color: grey;
            color: white;
            padding: 5px;
        }
        .inline-block{
            display: inline-block;
            width: 120px;
            height: 50px;
            background-color: blueviolet;
            color: white;
            padding: 10px;
            margin: 10px;
        }
        .none{
            display: none;
            
        }

    </style>

</head>

<body>
    <h2>Display Block Sample</h2>
    <div class="Block">Block 1</div>
    <div class="Block">Block 2</div>
    <div class="Block">Block 3</div>


    <h2>Display Inline Sample</h2>
    <span class="inline">Inline 1</span>
    <span class="inline">Inline 2</span>
    <span class="inline">Inline 3</span>

    <h2>Display Inline-block Sample</h2>
    <div class="inline-block">Inline-block 1</div>
    <div class="inline-block">Inline-block 2</div>
    <div class="inline-block">Inline-block 3</div>

    <h2>Display None Sample</h2>
    <div class="none">none </div>

</body>
</html>
